name: Flutter Web CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Generate Firebase options
        run: |
          mkdir -p lib/models/app
          if [ -n "${{ secrets.FIREBASE_OPTIONS_FILE }}" ]; then
            echo "${{ secrets.FIREBASE_OPTIONS_FILE }}" | base64 --decode > lib/models/app/firebase_options.dart
          else
            cp lib/models/app/firebase_options.example.dart lib/models/app/firebase_options.dart
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Cache Flutter dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze code
        run: flutter analyze lib test

      - name: Run tests
        run: flutter test --reporter=compact

      - name: Run fcheck
        run: |
          set -e
          mkdir -p "$PWD/.dart_tool/fcheck_pub_cache"
          export PUB_CACHE="$PWD/.dart_tool/fcheck_pub_cache"
          dart pub global activate fcheck 1.4.1
          dart pub global run fcheck --list full --strict

      - name: Build Flutter Web
        run: flutter build web --release --no-wasm-dry-run --dart-define=FLUTTER_WEB_CANVASKIT_URL=/canvaskit/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: flutter-web-build
          path: build/web/

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Restore Firebase options
        run: |
          mkdir -p lib/models/app
          if [ -n "${{ secrets.FIREBASE_OPTIONS_FILE }}" ]; then
            echo "${{ secrets.FIREBASE_OPTIONS_FILE }}" | base64 --decode > lib/models/app/firebase_options.dart
          else
            cp lib/models/app/firebase_options.example.dart lib/models/app/firebase_options.dart
          fi

      - name: Restore firebase.json from secret
        run: |
          if [ -n "${{ secrets.FIREBASE_JSON }}" ]; then
            echo "${{ secrets.FIREBASE_JSON }}" | base64 --decode > firebase.json
            echo "✓ Restored firebase.json from secret"
          else
            echo "✗ FIREBASE_JSON secret not found, creating minimal firebase.json"
            echo '{
              "hosting": {
                "site": "vteam-cards",
                "public": "build/web",
                "ignore": [
                  "firebase.json",
                  "**/.*",
                  "**/node_modules/**"
                ]
              }
            }' > firebase.json
          fi

          # Ensure hosting configuration has the correct public path for web deployment
          if grep -q '"hosting"' firebase.json; then
            # Use jq to properly update the hosting configuration if available
            if command -v jq &> /dev/null; then
              # Remove source property and set public property
              jq 'if .hosting.source then .hosting |= del(.source) else . end | .hosting.public = "build/web"' firebase.json > firebase.json.tmp && mv firebase.json.tmp firebase.json
              echo "✓ Updated hosting configuration using jq: removed source, set public to build/web"
            else
              # Fallback to sed if jq is not available - remove source line and add public
              sed -i '/"source":/d' firebase.json
              sed -i '/"hosting": {/a\    "public": "build/web",' firebase.json
              echo "✓ Updated hosting configuration using sed: removed source, added public to build/web"
            fi
          else
            echo "✗ No hosting configuration found in firebase.json"
          fi

      - name: Download web build
        uses: actions/download-artifact@v8.0.1
        with:
          name: flutter-web-build
          path: build

      - name: Move build files to correct location
        run: |
          if [ -f "build/main.dart.js" ] && [ ! -d "build/web" ]; then
            echo "Moving build files from build/ to build/web/"
            mkdir -p build/web
            mv build/* build/web/ 2>/dev/null || true
            # Remove any empty directories that might have been created
            rmdir build/web/web 2>/dev/null || true
          fi

      - name: Verify build directory exists
        run: |
          if [ ! -d "build/web" ]; then
            echo "ERROR: build/web directory not found!"
            echo "Contents of build directory:"
            ls -la build/
            exit 1
          fi
          echo "Build directory verified: build/web exists"

      - name: Verify firebase.json configuration
        run: |
          echo "Current firebase.json configuration:"
          cat firebase.json
          echo ""
          echo "Checking if firebase hosting config is valid for CI deploy..."
          if python3 - <<'PY'
          import json

          with open('firebase.json', encoding='utf-8') as fh:
              hosting = json.load(fh).get('hosting', {})

          has_public_build_web = hosting.get('public') == 'build/web'
          has_frameworks_hosting = (
              hosting.get('source') == '.' and 'frameworksBackend' in hosting
          )

          raise SystemExit(0 if has_public_build_web or has_frameworks_hosting else 1)
          PY
          then
            echo "✓ firebase.json hosting config is valid"
          else
            echo "✗ firebase.json hosting config is neither public build/web nor framework-based hosting"
            exit 1
          fi

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Deploy to Firebase Hosting
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VTEAM_CARDS }}
          EOF

          deploy_log="$RUNNER_TEMP/firebase-hosting-deploy.log"

          set +e
          npx firebase-tools@latest deploy --only hosting --project vteam-cards --non-interactive 2>&1 | tee "$deploy_log"
          exit_code=${PIPESTATUS[0]}
          set -e

          if [[ "$exit_code" -eq 0 ]]; then
            exit 0
          fi

          if grep -Fq "is the current active version" "$deploy_log"; then
            echo "Firebase Hosting is already serving this version; treating deploy as a successful no-op."
            exit 0
          fi

          exit "$exit_code"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          FIREBASE_CLI_EXPERIMENTS: webframeworks
